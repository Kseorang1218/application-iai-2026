# 랜덤시드
seed: 42

# 데이터셋 별 도메인 정의
cwru_domain:
  A: 1730 
  B: 1750
  C: 1772
  D: 1797

pu_domain:
  A: 900
  B: 1500

uos_domain:
  A: 600
  B: 800
  C: 1000
  D: 1200
  E: 1400
  F: 1600

# 데이터셋별 샘플링 주파수 (Hz)
sampling_rate:
  cwru: 12000
  pu: 64000
  uos: 16000

# 슬라이딩 윈도우 크기 (데이터셋별 오버라이드 없으면 기본값 사용)
window_size: 2048

# 데이터셋별 윈도우 크기 오버라이드
# PU: 64 kHz에서 2048 샘플 = 32ms = 0.48회전(@ 900 RPM) → 1회전 미만. 8192로 ≈ 1.92회전 확보
# 주파수 해상도: 2048@64kHz=31.2Hz/bin → 8192@64kHz=7.8Hz/bin (BPFO≈45-90Hz 해상 가능)
window_size_override:
  cwru: 2048
  pu: 8192
  uos: 2048

# 데이터셋별 env_spec bandpass (null=전대역, [low_hz, high_hz]=명시적 범위)
# PU: 64 kHz에서 2-8 kHz bandpass는 PU 베어링 공진 대역과 맞지 않아 전대역 사용
env_spec_bandpass:
  cwru: [2000, 5900]   # Nyquist=6000Hz이므로 상한을 5900으로 설정
  pu: null
  uos: null

# 데이터셋별 DualBoundarySVDD rho 오버라이드 (main 섹션 기본값 덮어씀)
# PU cepstrum 1500→900 개선: fault p99=2.41R, normal p99=1.19R → rho_outer=1.2로 낮춰도 FP 최소
dataset_overrides:
  pu:
    rho_inner: 0.5
    rho_outer: 1.2
    # raw: RPM-dependent amplitude, 정보 없음
    # order_spec: n_revs=1 → 정수 order만 포착, 비정수 결함 order(BPFO≈3.56 등) 누락
    preprocessing_ids:
      env_spec: "p3_envspec"
      cepstrum: "p4_cepstrum"
      tds: "p6_tds"

# Order envelope spectrum 파라미터
# samples_per_rev: 회전당 angular resample 수 (order Nyquist = spr/2)
# max_order: 보유할 최대 order (베어링 결함 order는 보통 < 15)
# n_revs: 도메인 간 feature 차원 통일을 위해 RPM이 달라도 동일한 회전 수 사용
#   계산 근거 (window_size/fs × rpm_min/60 의 floor):
#     cwru: floor(2048/12000 × 1730/60) = floor(4.94) = 4  → 0.25-order 해상도
#     pu:   floor(8192/64000 × 900/60)  = floor(1.92) = 1  → 1-order 해상도
#     uos:  floor(2048/16000 × 600/60)  = floor(1.28) = 1  → 1-order 해상도
order_spec_params:
  samples_per_rev: 64
  max_order: 20.0
  n_revs:
    cwru: 4
    pu: 1
    uos: 1

# 본 실험 설정
main:
  preprocessing_ids:
    raw: "p1_raw"
    env_spec: "p3_envspec"
    cepstrum: "p4_cepstrum"
    tds: "p6_tds"
    order_spec: "p7_orderspec"
  per_window_norm_keys: ["env_spec", "cepstrum", "tds"]
  cepstrum_lifter_n:
    cwru: 64
    uos:  2048
    pu:   4096
  svdd_nu: 0.1
  svdd_max_iter: 1000
  svdd_tol: 0.001
  # DualBoundarySVDD OTTA hyperparameters
  buffer_size: 100               # OnlineSVDD SV 버퍼 슬롯 수 (constrained 실험용)
  no_constraint_buffer_cap: 5000 # no_buffer_constraint 실험 시 PU처럼 N_src 큰 데이터셋 상한
  rho_inner: 0.5                 # r_inner = rho_inner · R  (R 안쪽 50%)
  rho_outer: 1.5                 # r_outer = rho_outer · R  (R 바깥쪽 150%)
  warmup_ratio: 0.10             # n_warmup = int(n_target_normal · warmup_ratio)
  max_inner_iter: 10             # partial_fit 내 SMO 반복 상한 (KKT gap < tol 시 조기 종료)
  # 분포 분석 (OTTA decision 에 직접 사용하지 않음)
  r_inner_percentiles: [50]
  r_outer_percentiles: [95, 99, 99.5]
  tsne_subsample: 1000